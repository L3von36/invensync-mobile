name: invensync_mobile
description: InvenSync Mobile — Offline-first inventory & sales management (Flutter client for InvenSync API)
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local database (Drift / SQLite)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # HTTP client
  dio: ^5.7.0

  # Connectivity
  connectivity_plus: ^6.1.1

  # Secure storage (tokens)
  flutter_secure_storage: ^9.2.4

  # UI
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  collection: ^1.19.0
  rxdart: ^0.28.0
  logging: ^1.3.0

  # Icons
  material_design_icons_flutter: ^7.1.96
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  json_serializable: ^6.9.1
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/