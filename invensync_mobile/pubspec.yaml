name: invensync_mobile
description: InvenSync Mobile - Offline-first inventory & sales ERP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  
  # HTTP
  dio: ^5.7.0
  
  # Local database (Drift/SQLite)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # Storage (swap to flutter_secure_storage for production)
  shared_preferences: ^2.3.4
  
  # Connectivity
  connectivity_plus: ^6.1.1
  
  # Navigation
  go_router: ^14.8.1
  
  # UI
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_slidable: ^3.1.1
  pull_to_refresh_flutter3: ^2.0.2
  intl: ^0.19.0
  
  # Utils
  uuid: ^4.5.1
  collection: ^1.19.1
  rxdart: ^0.28.0
  logger: ^2.5.0
  
  # TOTP for 2FA
  otp: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true